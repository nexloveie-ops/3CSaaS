name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages & API
        run: npm run build

      - name: Build web
        run: npm run build -w @lz3c/web

      - name: Verify API Docker build
        run: docker build -f infra/Dockerfile -t lz3c-api:ci .

      - name: Verify Web Docker build
        run: docker build -f infra/Dockerfile.web -t lz3c-web:ci .
