services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      HOST: 0.0.0.0
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: infra/Dockerfile.web
    ports:
      - '8080:8080'
    environment:
      API_UPSTREAM: http://api:3000/api/
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
