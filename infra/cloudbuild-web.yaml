# Build & deploy Web (nginx + SPA) to Cloud Run
substitutions:
  _REGION: europe-west1
  _SERVICE: lz3c-web
  _API_UPSTREAM: ''

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/Dockerfile.web
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/lz3c/${_SERVICE}:$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/lz3c/${_SERVICE}:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/lz3c/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --set-env-vars=API_UPSTREAM=${_API_UPSTREAM}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/lz3c/${_SERVICE}:$SHORT_SHA
